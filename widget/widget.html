<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Widget - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
        /* Configuración de marca dinámica */
        :root {
            --brand-primary: #FFD600; /* Amarillo Mendoza por defecto */
            --brand-dark: #0f172a;
        }
        @layer base {
            body { @apply bg-slate-50 antialiased text-slate-900; }
        }
        .btn-primary {
            background-color: var(--brand-primary);
            @apply text-black font-black uppercase tracking-tighter py-4 px-6 rounded-xl transition-all active:scale-95 shadow-lg shadow-yellow-500/20;
        }
        .input-field {
            @apply w-full p-4 bg-white border-2 border-slate-100 rounded-xl text-lg outline-none focus:border-[var(--brand-primary)] transition-colors placeholder:text-slate-400;
        }
        .icon-btn {
            @apply absolute right-3 top-1/2 -translate-y-1/2 p-2 text-slate-400 hover:text-black transition-colors;
        }
        .loader-dots {
            @apply flex gap-1 justify-center items-center h-6;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl shadow-slate-200/50 p-6 border border-slate-100">
        
        <header class="mb-8 text-center">
            <h2 class="text-2xl font-black uppercase tracking-tight italic">Taxi<span class="text-slate-400 font-light">Go</span></h2>
            <p class="text-slate-500 text-sm font-medium">Despacho inmediato en Mendoza</p>
        </header>

        <div id="ui" class="space-y-4">
            <div class="relative group">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-xl">🎯</span>
                <input type="text" id="origin" placeholder="¿Dónde te buscamos?" class="input-field pl-12">
                <button onclick="detectarUbicacion()" class="icon-btn" title="Usar mi ubicación actual">
                    📍
                </button>
            </div>

            <div class="relative group">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-xl">🏁</span>
                <input type="text" id="destination" placeholder="¿A dónde vas?" class="input-field pl-12">
            </div>

            <div class="pt-2">
                <label class="text-[10px] uppercase font-bold text-slate-400 ml-1 mb-1 block tracking-widest">Datos del Pasajero</label>
                <input type="text" id="passenger_name" placeholder="Escribe tu nombre" class="input-field border-dashed">
            </div>

            <div class="pt-2">
                <label class="text-[10px] uppercase font-bold text-slate-400 ml-1 mb-1 block tracking-widest">Método de Pago</label>
                <select id="payment_method" class="input-field py-3 appearance-none cursor-pointer">
                    <option value="Efectivo">💵 Efectivo</option>
                    <option value="Mercado Pago">📱 Mercado Pago</option>
                </select>
            </div>

            <button onclick="enviar()" class="btn-primary w-full mt-4">
                Confirmar Pedido
            </button>
        </div>

        <div id="status" class="hidden text-center p-8 animate-pulse">
            <div class="inline-block p-4 rounded-full bg-yellow-100 mb-4 text-3xl">🚖</div>
            <p class="font-bold text-slate-800 text-lg" id="status-text">Buscando móvil...</p>
            <p class="text-sm text-slate-400 mt-2">No cierres esta ventana</p>
        </div>
    </div>

    <script>
        // Configuración regional para Mendoza
        const MZA_BOUNDS = { north: -32.75, south: -33.10, west: -68.95, east: -68.70 };
        let originCoords = null;
        let destCoords = null;
        let mapsGeocoding = null;
        let appConfig = {};

        function getWhatsAppNumber() {
            return appConfig.whatsappNumber || "5492610000000"; // Fallback de seguridad
        }

        // Cargar Maps dinámicamente desde el backend de Vercel
        async function init() {
            try {
                const res = await fetch('/api/config');
                appConfig = await res.json();
                
                const { mapsKey } = appConfig;
                
                const script = document.createElement('script');
                script.src = `https://maps.googleapis.com/maps/api/js?key=${mapsKey}&libraries=places`;
                script.onload = () => {
                    const opts = { 
                        componentRestrictions: { country: "ar" },
                        bounds: MZA_BOUNDS,
                        strictBounds: true,
                        fields: ["formatted_address", "geometry"]
                    };
                    
                    const autoOrigin = new google.maps.places.Autocomplete(document.getElementById('origin'), opts);
                    const autoDest = new google.maps.places.Autocomplete(document.getElementById('destination'), opts);

                    autoOrigin.addListener('place_changed', () => {
                        const place = autoOrigin.getPlace();
                        if (place.geometry) originCoords = place.geometry.location.toJSON();
                    });

                    autoDest.addListener('place_changed', () => {
                        const place = autoDest.getPlace();
                        if (place.geometry) destCoords = place.geometry.location.toJSON();
                    });
                    
                    mapsGeocoding = new google.maps.Geocoder();
                };
                document.head.appendChild(script);
            } catch (err) {
                console.error("Error cargando configuración:", err);
            }
        }

        function detectarUbicacion() {
            if (!navigator.geolocation) return alert("Geolocalización no soportada");
            
            const btn = event.currentTarget;
            btn.innerText = "⏳";

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                originCoords = coords;
                
                if (mapsGeocoding) {
                    const { results } = await mapsGeocoding.geocode({ location: coords });
                    if (results[0]) {
                        document.getElementById('origin').value = results[0].formatted_address;
                    }
                }
                btn.innerText = "📍";
            }, () => {
                alert("No se pudo obtener tu ubicación");
                btn.innerText = "📍";
            });
        }

        function calcularPrecio(metros) {
            const km = metros / 1000;
            return Math.round(1200 + (km * 650));
        }

        function enviar() {
            const passenger = document.getElementById('passenger_name').value;
            const originStr = document.getElementById('origin').value;
            const destStr = document.getElementById('destination').value;
            const payment = document.getElementById('payment_method').value;

            if (!passenger) return alert("Por favor, ingresa tu nombre");
            if (!originStr) return alert("Ingresa un punto de origen");
            if (!destStr) return alert("Ingresa un destino");

            const btn = document.querySelector('button[onclick="enviar()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = "Calculando ruta...";
            btn.disabled = true;

            const service = new google.maps.DistanceMatrixService();
            service.getDistanceMatrix({
                origins: [originCoords || originStr],
                destinations: [destCoords || destStr],
                travelMode: google.maps.TravelMode.DRIVING,
            }, (response, status) => {
                if (status === "OK" && response.rows[0].elements[0].status === "OK") {
                    const element = response.rows[0].elements[0];
                    const precioEstimado = calcularPrecio(element.distance.value);
                    
                    const payload = {
                        id: Date.now(),
                        passenger: passenger,
                        origin: originStr,
                        dest: destStr,
                        coords: { origin: originCoords, dest: destCoords },
                        distance: element.distance.text,
                        duration: element.duration.text,
                        price: precioEstimado,
                        payment: payment
                    };

                    window.parent.postMessage({ type: "NEW_ORDER", payload }, "*");
                    
                    // Animación de salida UI
                    document.getElementById('ui').classList.add('hidden');
                    const statusDiv = document.getElementById('status');
                    statusDiv.classList.remove('hidden');
                    statusDiv.classList.add('flex', 'flex-col', 'items-center');
                } else {
                    alert("No pudimos calcular la ruta. Por favor verifica las direcciones.");
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            });
            
        }

        window.addEventListener("message", (e) => {
            if (e.data.type === "DISPATCH_CONFIRM") {
                const statusText = document.getElementById('status-text');
                statusText.innerHTML = `<span class="text-green-600 italic">¡Confirmado!</span><br>${e.data.message}`;
                document.getElementById('status').classList.remove('animate-pulse');
            }
        });

        init();
    </script>
</body>
</html>
